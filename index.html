            border-radius: 10px;
            position: absolute;
            top: 20px;
            left: 50%;

        .message-box p {

        }

        function openVideo() {
            // فحص وجود مشغل xPola

            iframe.onload = () => {
                // إذا تم تحميل iframe، يعني أن المشغل غير موجود
                document.getElementById('message-box').style.display = 'block';
            };

            iframe.onerror = () => {
                // إذا حدث خطأ في تحميل الرابط، سيتم فتح الفيديو مباشرة
                location.href = intentUrl;
            };

            document.body.appendChild(iframe);
        }
